<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank you — Shira &amp; Eitan</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&family=Tangerine:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .thankyou {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 2rem 1.5rem; background: var(--bg-alt);
    }
    .thankyou__names { font-family: var(--script); font-size: clamp(4rem, 14vw, 7rem); line-height: 1; color: var(--ink); }
    .thankyou__eyebrow { font-size: 0.75rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.2rem; }
    .thankyou h1 { font-size: clamp(2rem, 6vw, 3.2rem); margin: 0.4rem 0 1rem; color: var(--blue); }
    .thankyou p { color: var(--muted); font-size: 1.1rem; max-width: 460px; margin-bottom: 2rem; }
  </style>
</head>
<body>
  <main class="thankyou">
    <p class="thankyou__eyebrow">Kindly Replied</p>
    <h1>Thank you!</h1>
    <p>Your RSVP has been received. We're so grateful you'll be part of our day — we can't wait to celebrate with you.</p>
    <div class="thankyou__names">Shira &amp; Eitan</div>
    <a href="index.html" class="btn btn--outline" style="margin-top:2rem;">Back to the website</a>
  </main>
</body>
</html>
